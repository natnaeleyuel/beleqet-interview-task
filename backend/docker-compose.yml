version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: beleqet-postgres
    restart: always
    environment:
      POSTGRES_USER: beleqet_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: beleqet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beleqet_user -d beleqet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: beleqet-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beleqet-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      # Docker-network overrides — .env values use localhost, but within
      # compose the services are reachable by their container names.
      - DATABASE_URL=postgresql://beleqet_user:your_password@db:5432/beleqet_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=docker_default_secret_please_change_in_production
      - OPENAI_API_KEY=dummy_key_for_testing
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Note: The Next.js frontend (beleqet-jobs-nextjs/) does NOT have a Docker
  # service. It is designed to run standalone (npm run dev) connecting to the
  # backend at http://localhost:4000. This is intentional — the frontend is
  # a separate deployment unit and out of scope for this compose file.

volumes:
  postgres_data:
  redis_data:
